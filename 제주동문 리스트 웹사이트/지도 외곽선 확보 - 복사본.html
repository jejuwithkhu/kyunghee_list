<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>경희로드맵 명단</title>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Pretendard,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:#eaf6ff;color:#1d2630}
.wrap{max-width:1320px;margin:0 auto;padding:24px}

.logoBox{text-align:center;margin:10px 0 24px;}
.logoBox img{max-height:225px;width:auto;display:inline-block; object-fit:contain;}

.guide{font-size:23px;text-align:center;margin:0 0 18px;font-weight:800;color:#17345d}
.layout{display:grid;grid-template-columns:minmax(600px,1fr) 440px;gap:22px;align-items:start}
.mapBox{background:#dff3ff;border-radius:24px;padding:14px;box-shadow:0 10px 28px rgba(0,0,0,.18)}
.map-wrapper {position:relative; width:100%; max-width:1100px; margin:0 auto;}

svg{width:100%;height:auto;display:block;}

/* 클릭 가능한 구역 스타일 */
.region {
  cursor: pointer;
  transition: filter 0.2s ease, stroke-width 0.2s ease, stroke 0.2s ease;
}

.region:hover {
  filter: brightness(0.85);
  stroke: #263C73 !important; /* 빨간색을 파란색으로 변경 */
  stroke-width: 10px !important;
}

.region.active {
  filter: brightness(0.85);
  stroke: #263C73 !important; /* 빨간색을 파란색으로 변경 */
  stroke-width: 18px !important; /* 활성화 시 테두리 조금 더 두껍게 */
}

/* 툴팁 스타일 */
.tooltip {
  position: absolute;
  background-color: rgba(0, 0, 0, 0.8);
  color: white;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 16px;
  font-weight: bold;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
  z-index: 100;
  transform: translate(-50%, -100%);
  margin-top: -10px;
}

.panel{background:#fff;border-radius:24px;padding:24px;box-shadow:0 10px 28px rgba(0,0,0,.15);display:flex;flex-direction:column;height:760px;}
.panel-header{flex-shrink:0;}
.panel h2{font-size:34px;margin:0 0 10px;color:#17345d}
.count{font-size:22px;font-weight:900;color:#b30d0d;margin-bottom:14px}
.list-container{flex-grow:1;overflow-y:auto;padding-right:8px;}
.person{border-top:1px solid #dde6ef;padding:15px 0}
.person:first-of-type{border-top:4px solid #17345d}
.name{font-size:26px;font-weight:900;line-height:1.25}
.meta{font-size:22px;line-height:1.45;margin-top:4px}
.role{color:#17345d;font-weight:900}
.addr{font-size:19px;color:#596673;margin-top:6px}
.empty{font-size:24px;line-height:1.5;padding:22px;background:#f4f8fb;border-radius:16px}

.pagination{display:flex;justify-content:center;flex-wrap:wrap;gap:8px;margin-top:20px;padding-top:15px;border-top:1px solid #eee;flex-shrink:0;}
.page-btn{font-size:18px;font-weight:700;padding:6px 12px;border-radius:8px;border:1px solid #17345d;background:#fff;color:#17345d;cursor:pointer;transition:0.15s;}
.page-btn:hover, .page-btn.active{background:#17345d;color:#fff;}
.buttons{display:flex;flex-wrap:wrap;gap:10px;margin:16px 0}
.btn{font-size:21px;font-weight:900;padding:11px 16px;border-radius:999px;border:2px solid #17345d;background:white;cursor:pointer;color:#1d2630;transition:0.15s}
.btn:hover,.btn.active{background:#ffe08a;color:black}

@media(max-width:1050px){
  .layout{grid-template-columns:1fr}
  .panel{height:auto;max-height:none;}
  .guide{font-size:20px}
  .panel h2{font-size:31px}
  .name{font-size:25px}
  .meta{font-size:21px}
}
@media(max-width:650px){
  .wrap{padding:12px}
  .logoBox img { width: 90%; max-width: 400px; height: auto; max-height: none; }
  .guide{font-size:19px;}
  .mapBox{padding:8px;}
  .panel{padding:18px}
  .btn{font-size:18px;padding:10px 13px}
  .name{font-size:24px}
  .meta{font-size:20px}
  .addr{font-size:17px}
  .page-btn{font-size:16px;padding:5px 10px;}
}
</style>
</head>

var ORDER = ["제주시", "애월읍", "한림읍", "한경면", "대정읍", "안덕면", "중문", "서귀포시", "남원읍", "표선면", "성산읍", "구좌읍", "조천읍", "우도", "기타"];
var ITEMS_PER_PAGE = 10;
var currentRegion = '';
var currentPage = 1;

function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, function(m) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];
  });
}

function renderPage(page) {
  currentPage = page;
  var list = DATA[currentRegion] || [];
  
  var startIdx = (page - 1) * ITEMS_PER_PAGE;
  var endIdx = startIdx + ITEMS_PER_PAGE;
  var pageList = list.slice(startIdx, endIdx);
  
  var box = document.getElementById('list');
  var htmlString = '';
  
  if (pageList.length > 0) {
    for (var i = 0; i < pageList.length; i++) {
      var p = pageList[i];
      var pGubun = esc(p['구분']);
      var pName = esc(p['이름']);
      var pBigo = esc(p['비고']) || '-';
      var pJuso = esc(p['주소']) || '주소 없음';
      htmlString += '<div class="person"><div class="name"><span class="role">' + pGubun + '</span> ' + pName + '</div><div class="meta">' + pBigo + '</div><div class="addr">' + pJuso + '</div></div>';
    }
  } else {
    htmlString = '<div class="empty">현재 등록된 명단이 없습니다.</div>';
  }
  box.innerHTML = htmlString;
    
  var paginationBox = document.getElementById('pagination');
  var totalPages = Math.ceil(list.length / ITEMS_PER_PAGE);
  
  if (totalPages <= 1) {
    paginationBox.innerHTML = '';
  } else {
    var btnHtml = '';
    for (var j = 1; j <= totalPages; j++) {
      var activeClass = (j === currentPage) ? 'active' : '';
      btnHtml += '<button class="page-btn ' + activeClass + '" onclick="renderPage(' + j + ')">' + j + '</button>';
    }
    paginationBox.innerHTML = btnHtml;
  }
  box.scrollTop = 0;
}

function showRegion(r) {
  currentRegion = r;
  
  // 클릭 시 지도 구역 액티브 효과
  var paths = document.querySelectorAll('svg path.region'); // '.region' 만 타겟
  for (var m = 0; m < paths.length; m++) {
    var x = paths[m];
    if (x.getAttribute('data-name') === r) {
      x.classList.add('active');
    } else {
      x.classList.remove('active');
    }
  }
  
  // 하단 버튼 액티브 효과
  var btns = document.querySelectorAll('.btn');
  for (var k = 0; k < btns.length; k++) {
    if (btns[k].getAttribute('data-region') === r) {
      btns[k].classList.add('active');
    } else {
      btns[k].classList.remove('active');
    }
  }
  
  var list = DATA[r] || [];
  document.getElementById('regionTitle').textContent = r;
  document.getElementById('count').textContent = '총 ' + list.length + '명';
  
  renderPage(1);
    
  if (window.innerWidth < 1050) {
    document.getElementById('panel').scrollIntoView({block:'start', behavior:'smooth'});
  }
}

// 화면 로딩 완료 시 스크립트 실행
window.addEventListener('DOMContentLoaded', function() {
  var allPaths = document.querySelectorAll('svg path');
  var tooltip = document.getElementById('tooltip');
  
  // 1. data-name이 있는 구역(제주시 등)만 골라내서 기능 켜주기
  for (var i = 0; i < allPaths.length; i++) {
    var path = allPaths[i];
    var regionName = path.getAttribute('data-name');
    
    // 데이터 네임이 있다면 구역 선이므로 클릭 기능을 켬
    if (regionName) {
      // css 클래스는 하드코딩으로 넣어뒀으므로 주석처리
      // path.classList.add('region');
      
      // 클릭 시 명단 로드
      path.addEventListener('click', function() {
        showRegion(this.getAttribute('data-name'));
      });
      
      // 마우스 올리면 이름표(툴팁) 표시
     /* path.addEventListener('mousemove', function(e) {
        var svgRect = document.getElementById('svg-container').getBoundingClientRect();
        var name = this.getAttribute('data-name');
        tooltip.textContent = name;
        tooltip.style.opacity = 1;
        
        var x = e.clientX - svgRect.left;
        var y = e.clientY - svgRect.top;
        tooltip.style.left = x + 'px';
        tooltip.style.top = y + 'px';
      });*/
      
      // 마우스 벗어나면 이름표 숨김
      path.addEventListener('mouseleave', function() {
        tooltip.style.opacity = 0;
      });
    }
  }
  
  // 2. 하단에 지역 버튼 자동으로 만들기
  var bs = document.getElementById('buttons');
  for (var j = 0; j < ORDER.length; j++) {
    var rName = ORDER[j];
    if (DATA[rName] && DATA[rName].length > 0) {
      var b = document.createElement('button');
      b.className = 'btn';
      b.textContent = rName;
      b.setAttribute('data-region', rName);
      b.onclick = function() {
        showRegion(this.getAttribute('data-region'));
      };
      bs.appendChild(b);
    }
  }
  
  // 처음 켰을 때 제주시 보이도록 설정
  showRegion('제주시');
});

// 🔎 검색 버튼과 로직 연결 (반드시 script 태그 하단에 삽입)
// ==========================================
document.addEventListener('DOMContentLoaded', function() {
  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchBtn');

  if (searchBtn && searchInput) {
    // 1. 검색 함수 정의
    function searchPerson() {
      const keyword = searchInput.value.trim();
      if (!keyword) {
        alert("검색할 이름을 입력해주세요.");
        return;
      }

      let searchResults = [];
      // DATA 객체의 모든 지역을 순회하며 검색
      for (const region in DATA) {
        DATA[region].forEach(person => {
          if (person["이름"].includes(keyword)) {
            searchResults.push({ ...person, "소속지역": region });
          }
        });
      }

      // 결과 화면 표시
      const listContainer = document.getElementById('list');
      const regionTitle = document.getElementById('regionTitle');
      const count = document.getElementById('count');
      const paginationBox = document.getElementById('pagination');

      // 검색 시 페이지네이션은 숨김
      if (paginationBox) paginationBox.innerHTML = ''; 
      
      regionTitle.textContent = `"${keyword}" 검색 결과`;
      count.textContent = '총 ' + searchResults.length + '명';

      if (searchResults.length === 0) {
        listContainer.innerHTML = '<div class="empty">"'+keyword+'" 동문을 찾을 수 없습니다.</div>';
        return;
      }

      let html = '';
      searchResults.forEach(p => {
        html += '<div class="person">' +
                  '<div class="name"><span class="role">' + p.구분 + '</span> ' + p.이름 + 
                  ' <small style="font-size:14px; color:#666;">(' + p.소속지역 + ')</small></div>' +
                  '<div class="meta">' + (p.비고 || '-') + '</div>' +
                  '<div class="addr">' + (p.주소 || '주소 없음') + '</div>' +
                '</div>';
      });
      listContainer.innerHTML = html;
      listContainer.scrollTop = 0;

      // 지도에 켜진 하이라이트 모두 끄기
      document.querySelectorAll('svg .region').forEach(path => path.classList.remove('active'));
    }

    // 2. 클릭 이벤트 연결
    searchBtn.onclick = searchPerson;

    // 3. 엔터키 연결
    searchInput.onkeypress = function(e) {
      if (e.key === 'Enter') searchPerson();
    };
  }
});
